<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060d0f">
<title>GREENROAD · Daily Scratch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: #060d0f; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; overflow-x: hidden; position: relative;
    user-select: none; -webkit-user-select: none;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.06) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,136,0.06) 1px, transparent 1px);
    background-size: 50px 50px; z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.3; z-index: 0; pointer-events: none; }
  .orb1 { width: 400px; height: 400px; background: #00ff88; top: -120px; left: -120px; animation: float1 18s ease-in-out infinite; }
  .orb2 { width: 350px; height: 350px; background: #c59cff; bottom: -100px; right: -100px; animation: float2 22s ease-in-out infinite; }
  @keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(180px,120px); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-180px,-100px); } }

  .content {
    position: relative; z-index: 2; display: flex; flex-direction: column;
    align-items: center; width: 100%; max-width: 420px; gap: 20px;
    margin-top: 20px;
  }

  .header {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
  }
  .logo-m {
    font-size: 24px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, #00ff88, #00d4ff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .back-btn {
    color: #5fa07f; font-size: 11px; text-decoration: none; letter-spacing: 1px;
    padding: 6px 12px; border: 1px solid rgba(0,255,136,0.2); border-radius: 20px;
  }
  .back-btn:hover { color: #00ff88; border-color: #00ff88; }

  .date-label {
    color: #5fa07f; font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase; font-weight: 600;
  }

  .hint-text {
    color: #8b949e; font-size: 12px; text-align: center;
    letter-spacing: 1px; opacity: 0.8; animation: hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .hint-text.hidden { display: none; }

  /* CARD (scratch zone) */
  .scratch-card {
    width: 100%; aspect-ratio: 1.2 / 1;
    background: linear-gradient(135deg, rgba(14,26,34,0.9), rgba(10,24,36,0.9));
    border: 2px solid rgba(0,255,136,0.3);
    border-radius: 20px; position: relative; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 60px rgba(0,255,136,0.1);
  }
  .card-front, .card-back {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 30px;
  }
  /* Revealing layer (what's underneath) */
  .card-back {
    z-index: 1;
    background: linear-gradient(135deg, #0a1818, #1a0a18);
  }
  /* Scratchable layer (on top) */
  #scratchCanvas {
    position: absolute; inset: 0; z-index: 2;
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><circle cx='12' cy='12' r='10' fill='%2300ff88' opacity='0.3'/></svg>") 12 12, grab;
    touch-action: none;
    transition: opacity 0.6s;
  }
  #scratchCanvas.revealed { opacity: 0; pointer-events: none; }

  /* Content of the revealed card */
  .result-emoji {
    font-size: 64px; line-height: 1; margin-bottom: 16px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }
  .result-value {
    font-size: 52px; font-weight: 900; letter-spacing: -1px;
    margin-bottom: 10px; line-height: 1;
  }
  .result-value.win { color: #00ff88; text-shadow: 0 0 30px rgba(0,255,136,0.5); }
  .result-value.loss { color: #ff5577; text-shadow: 0 0 30px rgba(255,85,119,0.5); }
  .result-value.zero { color: #8b949e; }
  .result-message {
    font-size: 14px; color: #e6edf3; text-align: center;
    line-height: 1.5; max-width: 320px; font-weight: 600;
  }
  .result-stats {
    display: flex; gap: 24px; margin-top: 16px;
    font-size: 11px; color: #5fa07f; letter-spacing: 1px;
  }
  .result-stats span { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .result-stats strong { color: #e6edf3; font-size: 16px; font-weight: 700; }

  .reveal-btn {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    padding: 10px 22px; background: rgba(0,255,136,0.15);
    border: 1px solid rgba(0,255,136,0.4); border-radius: 20px;
    color: #00ff88; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; z-index: 3;
    transition: all 0.3s;
    font-family: inherit;
  }
  .reveal-btn:hover { background: rgba(0,255,136,0.3); transform: translateX(-50%) scale(1.05); }
  .reveal-btn.hidden { display: none; }

  /* Scratch instructions overlay */
  .scratch-overlay {
    position: absolute; inset: 0; z-index: 4; pointer-events: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: rgba(0,255,136,0.3); font-size: 14px; letter-spacing: 4px;
    font-weight: 700; text-transform: uppercase;
    transition: opacity 0.3s;
  }
  .scratch-overlay .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .scratch-overlay.fading { opacity: 0; }

  /* Progress bar */
  .progress-wrap {
    width: 100%; height: 4px; background: rgba(0,255,136,0.1); border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: linear-gradient(90deg, #00ff88, #00d4ff);
    width: 0%; transition: width 0.3s;
  }

  /* Stats footer */
  .secondary-stats {
    width: 100%; background: rgba(10,24,16,0.7);
    border: 1px solid rgba(26,74,42,0.4); border-radius: 12px;
    padding: 16px; font-size: 12px;
  }
  .secondary-stats-row {
    display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid rgba(26,74,42,0.3);
  }
  .secondary-stats-row:last-child { border-bottom: none; }
  .secondary-stats-row .label { color: #5fa07f; }
  .secondary-stats-row .value { color: #e6edf3; font-weight: 700; font-family: Consolas, monospace; }

  .status {
    color: #5fa07f; font-size: 11px; letter-spacing: 1px; opacity: 0.6;
  }

  /* Error state */
  .error-card {
    color: #ff5577; text-align: center; padding: 20px;
  }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="content">
    <div class="header">
      <div class="logo-m">GREENROAD</div>
      <a href="https://cgform-source.github.io/greenroad-remote/index.html" class="back-btn">← MENU</a>
    </div>

    <div class="date-label" id="dateLabel">CHARGEMENT...</div>

    <div class="hint-text" id="hintText">🎰 Gratte la carte pour révéler ta journée</div>

    <div class="scratch-card" id="scratchCard">
      <div class="card-back">
        <div class="result-emoji" id="emoji">⏳</div>
        <div class="result-value" id="resultValue">$0.00</div>
        <div class="result-message" id="resultMessage">...</div>
        <div class="result-stats" id="resultStats"></div>
      </div>
      <canvas id="scratchCanvas"></canvas>
      <div class="scratch-overlay" id="scratchOverlay">
        <div class="icon">✋</div>
        GRATTE ICI
      </div>
      <button class="reveal-btn" id="revealBtn">RÉVÉLER D'UN COUP</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="secondary-stats" id="secondaryStats" style="display:none;">
      <div class="secondary-stats-row">
        <span class="label">📅 Jour de la semaine</span>
        <span class="value" id="dayOfWeek">—</span>
      </div>
      <div class="secondary-stats-row">
        <span class="label">📊 Trades aujourd'hui</span>
        <span class="value" id="todayTrades">—</span>
      </div>
      <div class="secondary-stats-row">
        <span class="label">💰 Capital actuel</span>
        <span class="value" id="capital">—</span>
      </div>
    </div>

    <div class="status" id="status">⟳ SYNCHRO EN COURS</div>
  </div>

<script>
const GIST = "https://gist.githubusercontent.com/cgform-source/1c4e2920a94766263d6b729873b1e525/raw/greenroad_stats.json";
const SCRATCH_KEY_PREFIX = "greenroad_scratched_";

// Charge les données
async function loadData() {
  try {
    const r = await fetch(GIST + "?t=" + Date.now());
    const data = await r.json();
    setupScratchCard(data);
  } catch (err) {
    document.getElementById('status').textContent = '⚠ Erreur de connexion';
    document.querySelector('.card-back').innerHTML = '<div class="error-card">⚠ Impossible de charger les données</div>';
  }
}

function setupScratchCard(data) {
  const s = data.sobre || {};
  const today = data.today || {};
  const pnlSession = s.pnl_session || 0;
  const todayTrades = s.trades_today || 0;
  const capital = s.capital_usd || 0;

  // Date du jour (clé unique pour sessionStorage)
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
  document.getElementById('dateLabel').textContent = dateStr.toUpperCase();

  const dowNames = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  document.getElementById('dayOfWeek').textContent = dowNames[now.getDay()];
  document.getElementById('todayTrades').textContent = todayTrades + ' trade' + (todayTrades > 1 ? 's' : '');
  document.getElementById('capital').textContent = '$' + capital.toFixed(2);

  // Détermine le résultat
  let emoji, valueText, valueClass, message;
  if (todayTrades === 0) {
    emoji = '💤';
    valueText = 'AUCUN TRADE';
    valueClass = 'zero';
    message = "Pas de trade aujourd'hui. Patience ou marché peu favorable ?";
  } else if (pnlSession > 5) {
    emoji = '🏆';
    valueText = '+$' + pnlSession.toFixed(2);
    valueClass = 'win';
    message = "Belle journée ! Ta discipline paie.";
  } else if (pnlSession > 0) {
    emoji = '🟢';
    valueText = '+$' + pnlSession.toFixed(2);
    valueClass = 'win';
    message = "Journée positive. Continue comme ça.";
  } else if (pnlSession === 0) {
    emoji = '⚖️';
    valueText = '$0.00';
    valueClass = 'zero';
    message = "Journée neutre. Zéro perte, c'est déjà une victoire.";
  } else if (pnlSession > -5) {
    emoji = '🟠';
    valueText = '-$' + Math.abs(pnlSession).toFixed(2);
    valueClass = 'loss';
    message = "Petite perte. Analyse tes trades pour progresser.";
  } else {
    emoji = '🔴';
    valueText = '-$' + Math.abs(pnlSession).toFixed(2);
    valueClass = 'loss';
    message = "Journée difficile. Prends du recul, demain est un autre jour.";
  }

  document.getElementById('emoji').textContent = emoji;
  const valueEl = document.getElementById('resultValue');
  valueEl.textContent = valueText;
  valueEl.className = 'result-value ' + valueClass;
  document.getElementById('resultMessage').textContent = message;

  // Stats secondaires
  if (todayTrades > 0) {
    const wins = today.wins || 0;
    const losses = todayTrades - wins;
    const wr = todayTrades > 0 ? Math.round(wins / todayTrades * 100) : 0;
    document.getElementById('resultStats').innerHTML = `
      <span><strong>${wins}</strong>Wins</span>
      <span><strong>${losses}</strong>Losses</span>
      <span><strong>${wr}%</strong>Win Rate</span>
    `;
  }

  // Check si déjà gratté aujourd'hui
  const dateKey = SCRATCH_KEY_PREFIX + now.toISOString().slice(0, 10);
  const alreadyScratched = sessionStorage.getItem(dateKey) === '1';

  if (alreadyScratched) {
    revealInstantly();
  } else {
    initScratchCanvas();
  }

  document.getElementById('secondaryStats').style.display = 'block';
  document.getElementById('status').textContent = '⟳ MAJ ' + now.toLocaleTimeString('fr-FR');
}

function initScratchCanvas() {
  const canvas = document.getElementById('scratchCanvas');
  const card = document.getElementById('scratchCard');
  const rect = card.getBoundingClientRect();

  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  // Dessine la couche à gratter
  const gradient = ctx.createLinearGradient(0, 0, rect.width, rect.height);
  gradient.addColorStop(0, '#00cc66');
  gradient.addColorStop(0.5, '#00ff88');
  gradient.addColorStop(1, '#00d4ff');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, rect.width, rect.height);

  // Pattern de points pour l'aspect texture
  ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
  for (let i = 0; i < 150; i++) {
    const x = Math.random() * rect.width;
    const y = Math.random() * rect.height;
    ctx.beginPath();
    ctx.arc(x, y, Math.random() * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Symbole central "?"
  ctx.fillStyle = 'rgba(6,13,15,0.25)';
  ctx.font = 'bold 180px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', rect.width / 2, rect.height / 2);

  ctx.globalCompositeOperation = 'destination-out';

  let isDrawing = false;
  let scratchedPixels = 0;
  const totalPixels = rect.width * rect.height;

  function getPointerPos(e) {
    const touch = e.touches ? e.touches[0] : e;
    const rect = canvas.getBoundingClientRect();
    return {
      x: touch.clientX - rect.left,
      y: touch.clientY - rect.top
    };
  }

  function scratch(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPointerPos(e);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
    ctx.fill();

    // Calcule progression (approximatif)
    scratchedPixels += Math.PI * 30 * 30;
    const pct = Math.min(100, (scratchedPixels / totalPixels) * 100 * 1.5);
    document.getElementById('progressBar').style.width = pct + '%';

    if (pct > 60 && !canvas.classList.contains('revealed')) {
      reveal();
    }

    // Cache l'overlay "gratte ici" dès le premier grattage
    const overlay = document.getElementById('scratchOverlay');
    if (!overlay.classList.contains('fading')) {
      overlay.classList.add('fading');
    }
  }

  function startScratch(e) {
    isDrawing = true;
    scratch(e);
  }

  function endScratch() {
    isDrawing = false;
  }

  canvas.addEventListener('mousedown', startScratch);
  canvas.addEventListener('mousemove', scratch);
  canvas.addEventListener('mouseup', endScratch);
  canvas.addEventListener('mouseleave', endScratch);
  canvas.addEventListener('touchstart', startScratch, { passive: false });
  canvas.addEventListener('touchmove', scratch, { passive: false });
  canvas.addEventListener('touchend', endScratch);

  // Bouton "Révéler d'un coup"
  document.getElementById('revealBtn').addEventListener('click', reveal);
}

function reveal() {
  const canvas = document.getElementById('scratchCanvas');
  canvas.classList.add('revealed');
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('scratchOverlay').classList.add('fading');
  document.getElementById('hintText').classList.add('hidden');

  // Mémorise qu'on a déjà gratté aujourd'hui
  const now = new Date();
  const dateKey = SCRATCH_KEY_PREFIX + now.toISOString().slice(0, 10);
  sessionStorage.setItem(dateKey, '1');

  // Vibration sur mobile si supportée
  if (navigator.vibrate) {
    navigator.vibrate([50, 50, 100]);
  }
}

function revealInstantly() {
  const canvas = document.getElementById('scratchCanvas');
  canvas.style.display = 'none';
  document.getElementById('revealBtn').classList.add('hidden');
  document.getElementById('scratchOverlay').classList.add('fading');
  document.getElementById('hintText').textContent = '✓ Déjà gratté aujourd\'hui';
  document.getElementById('progressBar').style.width = '100%';
}

// Charge et refresh toutes les 30s
loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
