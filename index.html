<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GREENROAD Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #060d0f;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 136, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 136, 0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
  }
  @keyframes gridMove {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 50px 50px, 50px 50px; }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: 0;
    pointer-events: none;
  }
  .orb1 { width: 400px; height: 400px; background: #00ff88; top: -100px; left: -100px; animation: float1 18s ease-in-out infinite; }
  .orb2 { width: 350px; height: 350px; background: #00d4ff; bottom: -100px; right: -100px; animation: float2 22s ease-in-out infinite; }
  .orb3 { width: 300px; height: 300px; background: #c59cff; top: 50%; left: 50%; animation: float3 25s ease-in-out infinite; }

  @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1);} 50% { transform: translate(200px,150px) scale(1.2);} }
  @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1);} 50% { transform: translate(-200px,-100px) scale(1.3);} }
  @keyframes float3 { 0%,100% { transform: translate(-50%,-50%) scale(1);} 50% { transform: translate(-30%,-70%) scale(1.4);} }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeInUp 1s ease-out;
    width: 100%;
    max-width: 420px;
  }
  @keyframes fadeInUp {
    0%   { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-size: 56px;
    font-weight: 900;
    background: linear-gradient(135deg, #00ff88 0%, #00d4ff 50%, #c59cff 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 4px;
    animation: gradientShift 6s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
    text-align: center;
  }
  @keyframes gradientShift { 0%,100% { background-position: 0% 50%;} 50% { background-position: 100% 50%;} }
  @keyframes glowPulse {
    0%,100% { filter: drop-shadow(0 0 20px rgba(0,255,136,0.5)); }
    50%     { filter: drop-shadow(0 0 40px rgba(0,212,255,0.7)); }
  }

  .scanner {
    width: 280px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00ff88, transparent);
    margin-bottom: 12px;
    animation: scan 3s ease-in-out infinite;
  }
  @keyframes scan {
    0%,100% { transform: scaleX(0.3); opacity: 0.5; }
    50%     { transform: scaleX(1);   opacity: 1; }
  }

  .subtitle {
    color: #00ff88;
    font-size: 12px;
    margin-bottom: 56px;
    letter-spacing: 6px;
    font-weight: 600;
    text-transform: uppercase;
    opacity: 0.9;
  }
  .subtitle .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #00ff88;
    border-radius: 50%;
    margin: 0 8px;
    animation: blink 1.5s ease-in-out infinite;
    box-shadow: 0 0 10px #00ff88;
  }
  @keyframes blink { 0%,100% { opacity: 1;} 50% { opacity: 0.3;} }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 100%;
  }

  .btn {
    display: flex;
    align-items: center;
    padding: 24px 28px;
    background: linear-gradient(135deg, rgba(14,26,34,0.9) 0%, rgba(10,24,36,0.9) 100%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 16px;
    color: #e6edf3;
    text-decoration: none;
    font-size: 17px;
    font-weight: 600;
    position: relative;
    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: conic-gradient(from var(--angle, 0deg), transparent 70%, #00ff88 85%, #00d4ff 100%);
    border-radius: 18px;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: -1;
    animation: rotate 4s linear infinite;
  }
  @property --angle { syntax: "<angle>"; initial-value: 0deg; inherits: false; }
  @keyframes rotate { to { --angle: 360deg; } }

  .btn::after {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.15), transparent);
    transition: left 0.6s ease;
  }

  .btn:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: transparent;
    box-shadow: 0 15px 40px rgba(0,255,136,0.25), 0 0 60px rgba(0,255,136,0.15);
  }
  .btn:hover::before { opacity: 1; }
  .btn:hover::after  { left: 100%; }

  .btn.secondary:hover {
    box-shadow: 0 15px 40px rgba(0,212,255,0.25), 0 0 60px rgba(0,212,255,0.15);
  }
  .btn.secondary::before {
    background: conic-gradient(from var(--angle, 0deg), transparent 70%, #00d4ff 85%, #c59cff 100%);
  }
  .btn.secondary::after {
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.15), transparent);
  }

  .btn.tertiary:hover {
    box-shadow: 0 15px 40px rgba(197,156,255,0.25), 0 0 60px rgba(197,156,255,0.15);
  }
  .btn.tertiary::before {
    background: conic-gradient(from var(--angle, 0deg), transparent 70%, #c59cff 85%, #ffd600 100%);
  }
  .btn.tertiary::after {
    background: linear-gradient(90deg, transparent, rgba(197,156,255,0.15), transparent);
  }

  .btn .icon-box {
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,212,255,0.08));
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 12px;
    margin-right: 18px;
    font-size: 26px;
    flex-shrink: 0;
    transition: all 0.4s;
  }
  .btn.secondary .icon-box {
    background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(197,156,255,0.08));
    border-color: rgba(0,212,255,0.3);
  }
  .btn.tertiary .icon-box {
    background: linear-gradient(135deg, rgba(197,156,255,0.15), rgba(255,214,0,0.08));
    border-color: rgba(197,156,255,0.3);
  }
  .btn:hover .icon-box {
    transform: rotate(-8deg) scale(1.1);
    border-color: #00ff88;
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
  }
  .btn.secondary:hover .icon-box {
    border-color: #00d4ff;
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
  }
  .btn.tertiary:hover .icon-box {
    border-color: #c59cff;
    box-shadow: 0 0 20px rgba(197,156,255,0.4);
  }

  .btn .text { flex: 1; }
  .btn .title-txt { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .btn .desc { font-size: 12px; color: #8b949e; font-weight: 400; margin-top: 4px; letter-spacing: 0.3px; }

  .btn .arrow { color: #00ff88; font-size: 24px; transition: all 0.4s; margin-left: 12px; }
  .btn.secondary .arrow { color: #00d4ff; }
  .btn.tertiary .arrow { color: #c59cff; }
  .btn:hover .arrow { transform: translateX(8px); text-shadow: 0 0 15px currentColor; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 48px;
    padding: 8px 18px;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 100px;
    font-size: 11px;
    color: #00ff88;
    letter-spacing: 2px;
    font-weight: 600;
  }
  .status-bar .live-dot {
    width: 8px; height: 8px;
    background: #00ff88;
    border-radius: 50%;
    box-shadow: 0 0 10px #00ff88;
    animation: blink 1.2s ease-in-out infinite;
  }

  .footer { margin-top: 20px; color: #484f58; font-size: 11px; letter-spacing: 1px; }

  @media (max-width: 480px) {
    .logo { font-size: 42px; letter-spacing: 3px; }
    .subtitle { font-size: 10px; letter-spacing: 4px; }
    .btn { padding: 20px 22px; }
    .btn .icon-box { width: 48px; height: 48px; font-size: 22px; }
    .btn .title-txt { font-size: 16px; }
  }
</style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="content">
    <div class="logo">GREENROAD</div>
    <div class="scanner"></div>
    <div class="subtitle">TRADING BOT<span class="dot"></span>HYPERLIQUID</div>

    <div class="menu">
      <a href="https://cgform-source.github.io/greenroad-remote/dashboard.html" class="btn">
        <div class="icon-box">📊</div>
        <div class="text">
          <div class="title-txt">Dashboard</div>
          <div class="desc">Monitoring temps réel</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://cgform-source.github.io/greenroad-remote/remotev2.html" class="btn secondary">
        <div class="icon-box">🎛️</div>
        <div class="text">
          <div class="title-txt">Pilotage</div>
          <div class="desc">Contrôle du bot</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="manuel.html" class="btn tertiary">
        <div class="icon-box">📖</div>
        <div class="text">
          <div class="title-txt">Manuel</div>
          <div class="desc">Documentation & guide</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>

    <div class="status-bar">
      <span class="live-dot"></span>
      SYSTÈME OPÉRATIONNEL
    </div>
    <div class="footer">v1.0 • 0x4911...64e7</div>
  </div>
</body>
</html>
