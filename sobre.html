<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>GREENROAD - Sobre</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: #060d0f; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; overflow-x: hidden; position: relative;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,136,0.06) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0,255,136,0.06) 1px, transparent 1px);
    background-size: 50px 50px; animation: gridMove 20s linear infinite; z-index: 0;
    mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
  }
  @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }
  .orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.3; z-index: 0; pointer-events: none; }
  .orb1 { width: 500px; height: 500px; background: #00ff88; top: -150px; left: -150px; animation: float1 18s ease-in-out infinite; }
  .orb2 { width: 400px; height: 400px; background: #00cc66; bottom: -120px; right: -120px; animation: float2 22s ease-in-out infinite; }
  @keyframes float1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(200px,150px) scale(1.2); } }
  @keyframes float2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-180px,-120px) scale(1.3); } }
  .content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; animation: fadeUp 1s ease-out; width: 100%; max-width: 500px; }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
  .header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; }
  .logo-m {
    font-size: 32px; font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(135deg, #00ff88, #33ffaa, #00cc66);
    background-size: 200% 200%;
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    animation: gShift 6s ease-in-out infinite, gPulse 3s ease-in-out infinite;
  }
  @keyframes gShift { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  @keyframes gPulse { 0%,100% { filter: drop-shadow(0 0 15px rgba(0,255,136,0.5)); } 50% { filter: drop-shadow(0 0 30px rgba(0,255,136,0.8)); } }
  .pill {
    padding: 6px 16px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px;
    background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; transition: all 0.4s;
  }
  .pill.off { background: rgba(255,85,119,0.1); border-color: rgba(255,85,119,0.3); color: #ff5577; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 12px #00ff88; animation: blink 1.2s ease-in-out infinite; }
  .pill.off .dot { background: #ff5577; box-shadow: 0 0 12px #ff5577; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .scan-line { width: 100%; height: 1px; margin-bottom: 24px; background: linear-gradient(90deg, transparent, #00ff88, transparent); animation: scanPulse 3s ease-in-out infinite; }
  @keyframes scanPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .card {
    width: 100%; background: rgba(10,24,16,0.8); border: 1px solid rgba(26,74,42,0.6);
    border-radius: 16px; padding: 20px 24px; margin-bottom: 14px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: border-color 0.4s;
  }
  .card:hover { border-color: rgba(0,255,136,0.4); }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: #5fa07f; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-weight: 800; color: #00ff88; line-height: 1.1; }
  .card-sub { font-size: 13px; color: #5fa07f; margin-top: 6px; }
  .card-row { display: flex; gap: 14px; width: 100%; }
  .card-row .card { flex: 1; }
  .activity-bar-wrap { width: 100%; height: 48px; background: #060d0f; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid rgba(26,74,42,0.4); }
  .activity-bar { height: 100%; border-radius: 8px; transition: width 1s ease, background 0.5s; }
  .activity-bar::after {
    content: ""; position: absolute; inset: 0; border-radius: 8px;
    background: linear-gradient(90deg, transparent 60%, rgba(255,255,255,0.1)); animation: barShine 2s ease-in-out infinite;
  }
  @keyframes barShine { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
  .activity-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.5); z-index: 2; }
  .activity-msg { text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 1px; color: #5fa07f; margin-top: 10px; }
  .footer { margin-top: 30px; text-align: center; font-size: 11px; color: #3a5a4a; }
  .footer a { color: #5fa07f; text-decoration: none; }
  .sync { font-size: 12px; color: #5fa07f; margin-top: 16px; letter-spacing: 1px; animation: syncPulse 2s infinite; }
  @keyframes syncPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="content">
  <div class="header">
    <div class="logo-m">GREENROAD</div>
    <div class="pill" id="pill"><span class="dot"></span><span id="pillTxt">CHARGEMENT</span></div>
  </div>
  <div class="scan-line"></div>
  <div class="card-row">
    <div class="card">
      <div class="card-label">CAPITAL</div>
      <div class="card-value" id="capital">...</div>
    </div>
    <div class="card">
      <div class="card-label">AUJOURD'HUI</div>
      <div class="card-value" id="today">...</div>
      <div class="card-sub" id="todaySub"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">P&L SESSION</div>
    <div class="card-value" id="pnl">...</div>
    <div class="card-sub" id="pnlSub"></div>
  </div>
  <div class="card">
    <div class="card-label">ACTIVITÉ DU BOT</div>
    <div class="activity-bar-wrap">
      <div class="activity-bar" id="actBar" style="width:0%"></div>
      <div class="activity-pct" id="actPct">0%</div>
    </div>
    <div class="activity-msg" id="actMsg">CHARGEMENT…</div>
  </div>
  <div class="sync" id="sync">⟳ SYNCHRO EN COURS</div>
  <div class="footer">
    <a href="https://cgform-source.github.io/greenroad-remote/index.html">← MENU PRINCIPAL</a>
    <br>· Vue Sobre · Anti-spoil
  </div>
</div>
<script>
const GIST="https://gist.githubusercontent.com/cgform-source/1c4e2920a94766263d6b729873b1e525/raw/greenroad_stats.json";
async function refresh(){
  try{
    const r=await fetch(GIST+"?t="+Date.now());
    const d=await r.json();
    const s=d.sobre||{};
    const pill=document.getElementById("pill"),pt=document.getElementById("pillTxt");
    if(s.bot_running){pill.classList.remove("off");pt.textContent="EN MARCHE";}
    else{pill.classList.add("off");pt.textContent="ARRÊTÉ";}
    document.getElementById("capital").textContent="$"+(s.capital_usd||0).toFixed(2);
    const t=s.trades_today||0;
    document.getElementById("today").textContent=t===0?"AUCUN":t+" TRADE"+(t>1?"S":"");
    document.getElementById("todaySub").textContent=t===0?"trade aujourd'hui":"aujourd'hui";
    const pnl=s.pnl_session||0,pe=document.getElementById("pnl"),ps=document.getElementById("pnlSub");
    if(pnl>0){pe.textContent="+$"+pnl.toFixed(2);pe.style.color="#00ff88";ps.textContent="session positive";ps.style.color="#00ff88";}
    else if(pnl<0){pe.textContent="-$"+Math.abs(pnl).toFixed(2);pe.style.color="#ff5577";ps.textContent="session négative";ps.style.color="#ff5577";}
    else{pe.textContent="$0.00";pe.style.color="#5fa07f";ps.textContent="session neutre";ps.style.color="#5fa07f";}
    const pct=Math.min(100,Math.max(0,s.activity_pct||0));
    const bar=document.getElementById("actBar"),ap=document.getElementById("actPct"),am=document.getElementById("actMsg");
    bar.style.width=pct+"%";ap.textContent=pct+"%";
    let col,msg;
    if(pct>=95){col="#00ff88";msg="⚡ ORDRE IMMINENT";}
    else if(pct>=75){col="#00cc66";msg="🔥 DÉCISION PROCHE";}
    else if(pct>=50){col="#009944";msg="👀 QUELQUE CHOSE SE PRÉPARE";}
    else if(pct>=25){col="#006633";msg="🔍 SURVEILLANCE ACTIVE";}
    else{col="#1a3a2a";msg="💤 BOT EN REPOS";}
    bar.style.background=col;am.textContent=msg;am.style.color=pct>=50?"#00ff88":"#5fa07f";
    document.getElementById("sync").textContent="⟳ MAJ "+new Date().toLocaleTimeString("fr-FR");
  }catch(e){document.getElementById("sync").textContent="⚠ Erreur de connexion";}
}
refresh();setInterval(refresh,15000);
</script>
</body>
</html>
